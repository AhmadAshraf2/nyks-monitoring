server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://MONITORING_IP:3100/loki/api/v1/push
    external_labels:
      host: HOSTNAME  # change per server: validator-node-1, sentry-node-1, etc.
    batchwait: 1s
    batchsize: 1048576

scrape_configs:
  # nyksd log files (all servers)
  - job_name: nyksd
    static_configs:
      - targets: [localhost]
        labels:
          service: nyksd
          __path__: /var/log/nyksd*.log
    pipeline_stages:
      # Parse Tendermint structured JSON logs
      - json:
          expressions:
            level: level
            module: module
            msg: msg
      - labels:
          level:
          module:

  # btcoracle log files (validators only, not on sentry nodes)
  # Comment out this section on sentry nodes
  - job_name: btcoracle
    static_configs:
      - targets: [localhost]
        labels:
          service: btcoracle
          __path__: /var/log/btcoracle*.log

  # Supervisor logs
  - job_name: supervisor
    static_configs:
      - targets: [localhost]
        labels:
          service: supervisor
          __path__: /var/log/supervisor/*.log
