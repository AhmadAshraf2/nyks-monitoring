server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://MONITORING_IP:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576

scrape_configs:
  # Auto-discover all Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Use container name as label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      # Add compose service name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      # Add compose project
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
      # Drop promtail's own logs
      - source_labels: ['__meta_docker_container_name']
        regex: '/promtail'
        action: drop
    pipeline_stages:
      # Parse nyksd structured JSON logs (Tendermint logger)
      - match:
          selector: '{service="nyks"}'
          stages:
            - json:
                expressions:
                  level: level
                  module: module
                  msg: msg
            - labels:
                level:
                module:

  # Systemd journal logs (for services running outside Docker)
  - job_name: journal
    journal:
      max_age: 12h
      path: /var/log/journal
      labels:
        source: journal
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: 'unit'
      - source_labels: ['__journal__hostname']
        target_label: 'hostname'
      # Only keep relevant units — add more as needed
      - source_labels: ['__journal__systemd_unit']
        regex: '(nyksd|depositconfirmer|docker)\.service'
        action: keep
