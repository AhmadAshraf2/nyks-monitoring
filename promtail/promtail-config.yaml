server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://MONITORING_IP:3100/loki/api/v1/push
    external_labels:
      host: HOSTNAME  # change per server: validator-node-1, sentry-node-1, etc.
    batchwait: 1s
    batchsize: 1048576

scrape_configs:
  # nyksd stdout logs (all servers)
  - job_name: nyksd-out
    static_configs:
      - targets: [localhost]
        labels:
          service: nyksd
          stream: stdout
          __path__: /home/ubuntu/nyks-logs/nyksd.out.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            module: module
            msg: msg
      - labels:
          level:
          module:

  # nyksd stderr logs (all servers)
  - job_name: nyksd-err
    static_configs:
      - targets: [localhost]
        labels:
          service: nyksd
          stream: stderr
          __path__: /home/ubuntu/nyks-logs/nyksd.err.log

  # btcoracle stdout logs (validators only — comment out on sentry nodes)
  - job_name: btcoracle-out
    static_configs:
      - targets: [localhost]
        labels:
          service: btcoracle
          stream: stdout
          __path__: /var/log/btcoracle.out.log

  # btcoracle stderr logs (validators only — comment out on sentry nodes)
  - job_name: btcoracle-err
    static_configs:
      - targets: [localhost]
        labels:
          service: btcoracle
          stream: stderr
          __path__: /var/log/btcoracle.err.log

  # Supervisor logs
  - job_name: supervisor
    static_configs:
      - targets: [localhost]
        labels:
          service: supervisor
          __path__: /var/log/supervisor/*.log
