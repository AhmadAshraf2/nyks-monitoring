apiVersion: 1

groups:
  - orgId: 1
    name: nyks-alerts
    folder: Nyks
    interval: 5m
    rules:
      - uid: error-logs-alert
        title: New Error Logs Detected
        condition: C
        noDataState: OK
        execErrState: OK
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: P8E80F9AEF21F6940
            model:
              expr: 'sum(count_over_time({service=~".+"} |~ "(?i)error" !~ "(?i)duplicate" !~ "\"error\":null" !~ "error=null" [5m]))'
              queryType: instant
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "New error logs detected across Nyks chain services"
          description: "Errors found in the last 5 minutes. Check Grafana dashboard for details."

      - uid: chain-halted-alert
        title: Chain Halted
        condition: C
        noDataState: OK
        execErrState: OK
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'increase(max(tendermint_consensus_height)[10m:])'
              queryType: instant
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Nyks chain has stopped producing blocks"
          description: "No new blocks in the last 10 minutes."

      - uid: no-peers-alert
        title: Node Has No Peers
        condition: C
        noDataState: OK
        execErrState: OK
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'min(tendermint_p2p_peers)'
              queryType: instant
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "A node has lost all peers"
          description: "At least one node has 0 peers for over 2 minutes."
